name: Test Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read

jobs:
  test-merge:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Pulp version
        shell: bash
        run: |
          set -euo pipefail
          echo "PULP_VERSION=$(tr -d '\n\r' < .pulp_version)" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install browsers (Playwright)
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright + ephemeral Pulp)
        run: ./tests/run_container.sh npm run test:e2e
        env:
          IMAGE_TAG: ${{ env.PULP_VERSION }}
